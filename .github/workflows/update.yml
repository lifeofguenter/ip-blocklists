name: update-blocklists

on:
  schedule:
    # Daily at 03:27 UTC. Off the hour to avoid the scheduler's peak backlog.
    - cron: "27 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-blocklists
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install --requirement requirements.txt

      # Any unreachable, unparsable, empty or poisoned feed exits non-zero here.
      # The job then fails without touching ipv4.txt/ipv6.txt, the previous good
      # lists stay committed, and GitHub emails the failure.
      - name: Build blocklists
        run: python -m blocklists.build

      - name: Commit updated lists
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ipv4.txt ipv6.txt tor_ipv4.txt tor_ipv6.txt
          if git diff --cached --quiet; then
            echo "Lists unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "chore: update blocklists ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
