name: update-blocklists

on:
  schedule:
    # Daily at 03:27 UTC. Off the hour to avoid the scheduler's peak backlog.
    - cron: "27 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-blocklists
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install --requirement requirements.txt

      # Any unreachable, unparsable, empty or poisoned feed exits non-zero here.
      # The job then fails before the upload step, so the assets already attached
      # to the release stay in place and GitHub emails the failure.
      - name: Build blocklists
        run: python -m builder.build

      # The lists are published as release assets rather than committed. A 6 MB
      # file churning ~30k lines a day would add roughly a gigabyte of objects to
      # the repository each year, and would bury real changes under a daily
      # "chore: update" commit. Assets live outside git, so neither happens.
      - name: Publish lists to the rolling release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: latest
        run: |
          set -euo pipefail

          notes="Rebuilt $(date -u +%Y-%m-%dT%H:%MZ) from \`${GITHUB_SHA:0:7}\`."$'\n\n'
          notes+="| File | Entries |"$'\n'"| --- | --- |"$'\n'
          for file in blocklists/*.txt; do
            notes+="| \`$(basename "$file")\` | $(wc -l < "$file" | tr -d ' ') |"$'\n'
          done

          # The tag is created once and then reused, so the download URL below
          # stays stable forever:
          #   <repo>/releases/latest/download/ipv4.txt
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "Latest blocklists" --notes "$notes"
          fi

          gh release upload "$TAG" blocklists/*.txt --clobber
          gh release edit "$TAG" --notes "$notes"
